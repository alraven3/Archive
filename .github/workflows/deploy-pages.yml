name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Vérifiez que votre branche s'appelle bien 'main' (ou 'master')
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Si votre site est à la racine, laissez '.'
          # Si vos fichiers sont dans un dossier 'docs', mettez 'docs'
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
